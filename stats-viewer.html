<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CultureBotEval — Reports</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#f4f3ee;--card:#fff;--border:rgba(0,0,0,.09);
  --text:#18180f;--muted:#68685f;
  --blue:#2b7fd4;--blue-bg:#e8f2fc;--blue-t:#0a3d6e;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:var(--bg);color:var(--text);}

/* ── AUTH GATE ── */
#auth-gate{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:var(--bg);
}
.auth-box{
  background:var(--card);border:.5px solid var(--border);border-radius:var(--r);
  padding:2rem 1.75rem;width:100%;max-width:340px;text-align:center;
}
.auth-box h1{font-size:18px;font-weight:500;margin-bottom:.25rem;color:var(--blue-t);}
.auth-box p{font-size:12px;color:var(--muted);margin-bottom:1.5rem;}
.field{margin-bottom:.85rem;text-align:left;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;
             text-transform:uppercase;letter-spacing:.05em;}
.field input{width:100%;padding:.5rem .75rem;border:.5px solid var(--border);border-radius:6px;
             background:var(--bg);color:var(--text);font-size:13px;outline:none;
             transition:border .15s;}
.field input:focus{border-color:var(--blue);}
.btn{width:100%;padding:.55rem;background:var(--blue);color:#fff;border:none;border-radius:6px;
     font-size:13px;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.err{font-size:11px;color:#c0392b;margin-top:.5rem;}

/* ── MAIN APP ── */
#app{display:none;}

.topbar{
  background:var(--card);border-bottom:.5px solid var(--border);
  padding:.75rem 2rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.topbar-title{font-size:15px;font-weight:500;color:var(--blue-t);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.user-pill{font-size:11px;background:var(--blue-bg);color:var(--blue-t);
           padding:3px 10px;border-radius:20px;}
.signout{font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;}

.tab-bar{
  background:var(--card);border-bottom:.5px solid var(--border);
  padding:0 2rem;display:flex;
}
.tab{
  padding:.75rem 1.25rem;font-size:13px;cursor:pointer;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}

.content{padding:0;}
.frame-wrap{height:calc(100vh - 103px);}
iframe{width:100%;height:100%;border:none;display:block;}

.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:calc(100vh - 103px);gap:12px;color:var(--muted);font-size:14px;
}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);
         border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.no-report{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:calc(100vh - 103px);color:var(--muted);font-size:14px;text-align:center;gap:8px;
}
.no-report strong{font-size:16px;color:var(--text);}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth-gate">
  <div class="auth-box">
    <h1>CultureBotEval</h1>
    <p>Sign in to access evaluation reports</p>
    <div class="field"><label>Email</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="field"><label>Password</label>
      <input type="password" id="pass" placeholder="••••••••"/>
    </div>
    <button class="btn" onclick="doLogin()">Sign In</button>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">CultureBotEval Reports</div>
    <div class="topbar-right">
      <span class="user-pill" id="user-label"></span>
      <span class="signout" onclick="doLogout()">Sign out</span>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" id="tab-stats"    onclick="switchTab('stats')">📊 Session Statistics</div>
    <div class="tab"        id="tab-criteria" onclick="switchTab('criteria')">📈 Criteria Charts</div>
  </div>

  <div class="content">
    <div id="pane-stats" class="frame-wrap">
      <div class="loading" id="load-stats">
        <div class="spinner"></div>Loading statistics…
      </div>
      <iframe id="frame-stats" style="display:none;"></iframe>
    </div>
    <div id="pane-criteria" class="frame-wrap" style="display:none;">
      <div class="loading" id="load-criteria">
        <div class="spinner"></div>Loading criteria charts…
      </div>
      <iframe id="frame-criteria" style="display:none;"></iframe>
    </div>
  </div>
</div>

<script>
/* ── Firebase config — ίδιο με admin.html ── */
const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "cultureboteval.firebaseapp.com",
  databaseURL:       "https://cultureboteval-default-rtdb.firebaseio.com",
  projectId:         "cultureboteval",
  storageBucket:     "cultureboteval.firebasestorage.app",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.database();

auth.onAuthStateChanged(async user=>{
  if(user){
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display       = 'block';
    document.getElementById('user-label').textContent  = user.email;

    /* Αποθήκευσε/ενημέρωσε χρήστη στο Firebase — ώστε να φαίνεται στο admin Users */
    await db.ref('users/' + user.uid).set({
      email:     user.email,
      lastLogin: new Date().toISOString()
    });

    await loadLatestReports();
  }
});

async function doLogin(){
  const e = document.getElementById('email').value;
  const p = document.getElementById('pass').value;
  try{
    await auth.signInWithEmailAndPassword(e, p);
  }catch(err){
    document.getElementById('err').textContent = err.message;
  }
}

async function doLogout(){
  await auth.signOut();
  location.reload();
}

async function loadLatestReports(){
  try{
    const snap   = await db.ref('latestReports').once('value');
    const latest = snap.val();
    if(!latest){
      showNoReport('stats');
      showNoReport('criteria');
      return;
    }
    latest.stats    ? loadFrame('stats',    latest.stats)    : showNoReport('stats');
    latest.criteria ? loadFrame('criteria', latest.criteria) : showNoReport('criteria');
  }catch(e){
    showNoReport('stats');
    showNoReport('criteria');
  }
}

function loadFrame(type, rawUrl){
  const loadEl  = document.getElementById('load-'  + type);
  const frameEl = document.getElementById('frame-' + type);
  fetch(rawUrl)
    .then(r=>{ if(!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(html=>{
      frameEl.srcdoc        = html;
      loadEl.style.display  = 'none';
      frameEl.style.display = 'block';
    })
    .catch(()=>{ loadEl.style.display='none'; showNoReport(type); });
}

function showNoReport(type){
  const pane = document.getElementById('pane-' + type);
  const load = document.getElementById('load-' + type);
  if(load) load.style.display = 'none';
  pane.innerHTML = `<div class="no-report">
    <strong>No report available</strong>
    <span>Ask the admin to generate and publish a report.</span>
  </div>`;
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('pane-stats').style.display    = tab==='stats'    ? 'block' : 'none';
  document.getElementById('pane-criteria').style.display = tab==='criteria' ? 'block' : 'none';
}
</script>
</body>
</html>
