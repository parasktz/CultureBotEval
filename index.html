<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Persona Evaluation — Sign In</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-logo">Persona Evaluation System</div>
      <div class="header-sub">Sign in to continue</div>
    </div>
  </div>
</div>

<div class="page-sm" style="padding-top:3rem;">
  <div class="card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-signin" onclick="showTab('signin')">Sign In</button>
      <button class="auth-tab"        id="tab-signup" onclick="showTab('signup')">Sign Up</button>
    </div>

    <!-- SIGN IN -->
    <div class="auth-panel show" id="panel-signin">
      <button class="btn-google" id="google-signin">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Σύνδεση με Google
      </button>
      <div class="divider">ή με email</div>
      <div class="field">
        <div class="field-label">Email</div>
        <input class="fi" type="email" id="si-email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <div class="field-label">Κωδικός</div>
        <input class="fi" type="password" id="si-pass" placeholder="••••••••"/>
      </div>
      <div id="si-msg"></div>
      <div class="btn-row">
        <button class="btn primary btn-block" id="si-submit">Σύνδεση</button>
      </div>
    </div>

    <!-- SIGN UP -->
    <div class="auth-panel" id="panel-signup">
      <button class="btn-google" id="google-signup">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z"/></svg>
        Εγγραφή με Google
      </button>
      <div class="divider">ή με email</div>
      <div class="two-col">
        <div class="field">
          <div class="field-label">Όνομα</div>
          <input class="fi" type="text" id="su-name" placeholder="Το όνομά σας"/>
        </div>
        <div class="field">
          <div class="field-label">Email</div>
          <input class="fi" type="email" id="su-email" placeholder="you@example.com"/>
        </div>
      </div>
      <div class="field">
        <div class="field-label">Κωδικός</div>
        <input class="fi" type="password" id="su-pass" placeholder="Τουλάχιστον 6 χαρακτήρες"/>
      </div>
      <div class="field">
        <div class="field-label">Επιβεβαίωση κωδικού</div>
        <input class="fi" type="password" id="su-pass2" placeholder="Επανάληψη κωδικού"/>
      </div>
      <div id="su-msg"></div>
      <div class="btn-row">
        <button class="btn primary btn-block" id="su-submit">Δημιουργία λογαριασμού</button>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();

// Redirect if already logged in
auth.onAuthStateChanged(u => { if(u) window.location.href='role.html'; });

const $  = id => document.getElementById(id);
const esc = s => {const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;};

function showTab(t){
  ['signin','signup'].forEach(x=>{
    $('tab-'+x).classList.toggle('active', x===t);
    $('panel-'+x).classList.toggle('show', x===t);
  });
}

function setMsg(id, msg, type='err'){
  $(id).innerHTML = msg ? `<div class="notice ${type}" style="margin-top:.75rem;">${esc(msg)}</div>` : '';
}

function errMsg(code){
  const map = {
    'auth/user-not-found':       'Δεν βρέθηκε λογαριασμός με αυτό το email.',
    'auth/wrong-password':       'Λάθος κωδικός.',
    'auth/invalid-email':        'Μη έγκυρο email.',
    'auth/email-already-in-use': 'Αυτό το email χρησιμοποιείται ήδη.',
    'auth/weak-password':        'Ο κωδικός πρέπει να έχει τουλάχιστον 6 χαρακτήρες.',
    'auth/too-many-requests':    'Πολλές αποτυχημένες προσπάθειες. Δοκίμασε ξανά αργότερα.',
    'auth/popup-closed-by-user': 'Το παράθυρο σύνδεσης έκλεισε. Δοκίμασε ξανά.',
  };
  return map[code] || 'Σφάλμα: ' + code;
}

async function googleAuth(){
  try{
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
    window.location.href = 'role.html';
  }catch(e){ setMsg('si-msg', errMsg(e.code)); }
}

$('google-signin').addEventListener('click', googleAuth);
$('google-signup').addEventListener('click', googleAuth);

$('si-submit').addEventListener('click', async()=>{
  setMsg('si-msg','');
  const email=$('si-email').value.trim(), pass=$('si-pass').value;
  if(!email||!pass){ setMsg('si-msg','Συμπλήρωσε email και κωδικό.'); return; }
  try{
    await auth.signInWithEmailAndPassword(email, pass);
    window.location.href='role.html';
  }catch(e){ setMsg('si-msg', errMsg(e.code)); }
});

$('su-submit').addEventListener('click', async()=>{
  setMsg('su-msg','');
  const name=$('su-name').value.trim(), email=$('su-email').value.trim(),
        pass=$('su-pass').value, pass2=$('su-pass2').value;
  if(!name||!email||!pass){ setMsg('su-msg','Συμπλήρωσε όλα τα πεδία.'); return; }
  if(pass!==pass2){ setMsg('su-msg','Οι κωδικοί δεν ταιριάζουν.'); return; }
  try{
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({displayName: name});
    window.location.href='role.html';
  }catch(e){ setMsg('su-msg', errMsg(e.code)); }
});

// Enter key support
['si-email','si-pass'].forEach(id=>{
  $(id).addEventListener('keydown', e=>{ if(e.key==='Enter') $('si-submit').click(); });
});
['su-name','su-email','su-pass','su-pass2'].forEach(id=>{
  $(id).addEventListener('keydown', e=>{ if(e.key==='Enter') $('su-submit').click(); });
});
</script>
</body>
</html>
