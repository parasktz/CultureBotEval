<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Persona Evaluation — Evaluator</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="role.html" style="font-size:13px;color:var(--muted);margin-right:6px;">← Πίσω</a>
    <div>
      <div class="header-logo">Evaluator</div>
      <div class="header-sub">Επίλεξε session για αξιολόγηση</div>
    </div>
  </div>
  <div class="user-pill">
    <div class="user-avatar" id="user-initials"></div>
    <span id="user-email" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    <button class="btn sm" id="btn-signout">Έξοδος</button>
  </div>
</div>

<div class="page">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
    <div>
      <div class="page-title">Sessions</div>
      <div class="page-sub" style="margin:0;">Επίλεξε ένα session για να ξεκινήσεις την αξιολόγηση.</div>
    </div>
    <button class="btn sm" id="btn-refresh">↻ Ανανέωση</button>
  </div>

  <div id="sessions-body">
    <div style="text-align:center;padding:3rem;color:var(--muted);">
      <span class="spinner"></span><br><br>Φόρτωση sessions...
    </div>
  </div>

</div>

<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.database();
const $    = id => document.getElementById(id);
const esc  = s => {const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;};

auth.onAuthStateChanged(user => {
  if(!user){ window.location.href='index.html'; return; }
  const name = user.displayName || user.email;
  $('user-email').textContent = user.email;
  $('user-initials').textContent = name.trim().split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  loadSessions();
});

$('btn-signout').addEventListener('click', async()=>{ await auth.signOut(); window.location.href='index.html'; });
$('btn-refresh').addEventListener('click', loadSessions);

async function loadSessions(){
  $('sessions-body').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--muted);"><span class="spinner"></span><br><br>Φόρτωση sessions...</div>`;
  try{
    const snap = await db.ref('sessions').get();
    if(!snap.exists()){
      $('sessions-body').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--muted);">Δεν υπάρχουν sessions ακόμη.</div>`;
      return;
    }
    const sessions = snap.val();
    const entries  = Object.entries(sessions).reverse();

    let rows = entries.map(([code, s]) => {
      const evalCount = s.evaluations ? Object.keys(s.evaluations).length : 0;
      const queryShort = (s.query||'').length > 80 ? s.query.substring(0,80)+'…' : s.query;
      return `<tr>
        <td><span class="td-code">${esc(code)}</span></td>
        <td>
          <div style="font-size:13px;font-weight:500;">${esc(s.llmTitle||'—')}</div>
          <div class="td-muted">${esc(s.personaTitle||'')}</div>
        </td>
        <td style="max-width:260px;">
          <div style="font-size:13px;color:var(--text);">${esc(queryShort)}</div>
          <div class="td-muted">${esc(s.createdAt||'')} · ${esc(s.creator||'')} · ${evalCount} αξιολόγηση${evalCount!==1?'ες':''}</div>
        </td>
        <td>
          <a href="evaluation.html?session=${esc(code)}" class="btn sm primary">Αξιολόγηση →</a>
        </td>
      </tr>`;
    }).join('');

    $('sessions-body').innerHTML = `
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Κωδικός Session</th>
              <th>LLM</th>
              <th>Query</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }catch(e){
    $('sessions-body').innerHTML = `<div class="notice err">Σφάλμα φόρτωσης: ${esc(e.message)}</div>`;
  }
}
</script>
</body>
</html>
