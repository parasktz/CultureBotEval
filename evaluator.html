<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Persona Evaluation — Evaluator</title>
<link rel="stylesheet" href="styles.css"/>
<style>
.sess-card{background:var(--card);border:.5px solid var(--border);border-radius:var(--r);margin-bottom:1.25rem;overflow:hidden;}
.sess-head{padding:1rem 1.25rem;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.sess-title{font-size:15px;font-weight:500;margin-bottom:3px;}
.sess-meta{font-size:12px;color:var(--muted);line-height:1.7;}
.sess-query{font-size:12px;color:var(--muted);margin-top:4px;max-width:560px;}
.sess-role{font-size:15px;font-weight:500;color:var(--blue-t);background:var(--blue-bg);border-radius:6px;padding:5px 10px;margin-top:6px;display:inline-block;max-width:100%;white-space:pre-wrap;line-height:1.5;}

.evals-section{border-top:.5px solid var(--border);}
.evals-header{padding:.55rem 1.25rem;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;background:var(--bg);}

.eval-row{border-top:.5px solid var(--border);padding:.9rem 1.25rem;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.eval-left{flex:1;min-width:200px;}
.eval-who{font-size:13px;font-weight:500;}
.eval-when{font-size:11px;color:var(--muted);margin-top:1px;}
.eval-edited{display:inline-block;font-size:10px;color:var(--amber-t);background:var(--amber-bg);border-radius:3px;padding:1px 6px;margin-left:5px;}
.eval-mine{display:inline-block;font-size:10px;color:var(--blue-t);background:var(--blue-bg);border-radius:3px;padding:1px 6px;margin-left:5px;}
.scores-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.sc{font-size:10px;background:var(--bg);border:.5px solid var(--border);border-radius:4px;padding:2px 7px;color:var(--text);}
.sc.mine{background:var(--blue-bg);color:var(--blue-t);border-color:transparent;}

/* Edit form */
.edit-form{display:none;border-top:.5px solid var(--border);}
.edit-form.open{display:block;}

/* Frozen fields inside edit form */
.frozen-section{padding:1.25rem 1.25rem .75rem;background:var(--bg);border-bottom:.5px solid var(--border);}
.frozen-title{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.85rem;display:flex;align-items:center;gap:6px;}
.frozen-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:520px){.frozen-grid{grid-template-columns:1fr;}}
.frozen-field{margin-bottom:0;}
.frozen-label{font-size:11px;color:var(--muted);margin-bottom:3px;}
.frozen-val{background:var(--card);border:.5px solid var(--border);border-radius:var(--rsm);padding:7px 10px;font-size:13px;color:var(--text);white-space:pre-wrap;min-height:32px;}
.frozen-full{grid-column:1/-1;}

/* Criteria inside edit form */
.criteria-section{padding:1.25rem;}
.criteria-title{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.85rem;padding-bottom:.5rem;border-bottom:.5px solid var(--border);}
.ecc{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rsm);padding:.8rem 1rem;margin-bottom:.6rem;}
.ech{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.ecn{width:20px;height:20px;border-radius:50%;background:var(--blue-bg);color:var(--blue-t);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ecname{font-size:12px;font-weight:500;}
.emcg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.emco{padding:3px 10px;border-radius:20px;border:.5px solid var(--border2);font-size:11px;cursor:pointer;background:transparent;color:var(--text);font-family:inherit;transition:all .15s;}
.emco:hover{background:var(--card);}
.emco.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-t);font-weight:500;}
.emco.er{border-color:var(--red);}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="role.html" style="font-size:13px;color:var(--muted);">← Πίσω</a>
    <div>
      <div class="hdr-title">Evaluator</div>
      <div class="hdr-sub">Sessions & Αξιολογήσεις</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="avatar" id="av"></div>
    <span class="hdr-email" id="umail"></span>
    <button class="btn sm" id="btn-out">Έξοδος</button>
  </div>
</div>

<div class="page">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;">
    <div>
      <div style="font-size:18px;font-weight:500;">Sessions</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px;">Κάθε session εμφανίζει όλες τις αξιολογήσεις. Μπορείς να επεξεργαστείς τις δικές σου.</div>
    </div>
    <button class="btn sm" id="btn-refresh">↻ Ανανέωση</button>
  </div>
  <div id="main-body">
    <div style="text-align:center;padding:3rem;color:var(--muted);">
      <span class="spin"></span><br><br>Φόρτωση...
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.database();
const $    = id => document.getElementById(id);
const esc  = s => { const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; };
const now  = () => new Date().toLocaleString('el-GR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

const CRITERIA=[
  {id:1,  name:'Hallucination Flag',                      opts:['No Hallucination','Minor Hallucination','Major Hallucination','Cannot Determine']},
  {id:2,  name:'Query Relevance',                         opts:['Fully Relevant','Mostly Relevant','Partially Relevant','Not Relevant']},
  {id:3,  name:'Justification Quality',                   opts:['Excellent','Good','Fair','Poor']},
  {id:4,  name:'Evidence Grounding',                      opts:['Well Grounded','Mostly Grounded','Partially Grounded','Ungrounded']},
  {id:5,  name:'Clarity',                                 opts:['Very Clear','Clear','Somewhat Clear','Unclear']},
  {id:6,  name:'Result Usefulness',                       opts:['Very Useful','Useful','Somewhat Useful','Not Useful']},
  {id:7,  name:'Bias',                                    opts:['No Bias','Slight Bias','Moderate Bias','Significant Bias']},
  {id:8,  name:'Diversity',                               opts:['High','Moderate','Low','None']},
  {id:9,  name:'Completeness / Variety / Representative', opts:['Excellent','Good','Fair','Poor']},
  {id:10, name:'Needed Logical Steps',                    opts:['All Present','Mostly Present','Partially Present','Missing']}
];

let ME = null;
let editState = {};

auth.onAuthStateChanged(u => {
  if(!u){ location.href='index.html'; return; }
  ME = u;
  const name = u.displayName || u.email;
  $('umail').textContent = u.email;
  $('av').textContent    = name.trim().split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  load();
});

$('btn-out').addEventListener('click', async()=>{ await auth.signOut(); location.href='index.html'; });
$('btn-refresh').addEventListener('click', load);

async function load(){
  $('main-body').innerHTML=`<div style="text-align:center;padding:3rem;color:var(--muted);"><span class="spin"></span><br><br>Φόρτωση...</div>`;
  try{
    const snap = await db.ref('sessions').get();
    if(!snap.exists()){
      $('main-body').innerHTML=`<div style="text-align:center;padding:3rem;color:var(--muted);">Δεν υπάρχουν sessions ακόμη.</div>`;
      return;
    }
    editState = {};
    const sessions = snap.val();

    const html = Object.entries(sessions)
      .sort(([,a],[,b]) => (a.personaRole||'').localeCompare(b.personaRole||'', 'el'))
      .map(([code, s]) => {
      const allEvals = s.evaluations ? Object.entries(s.evaluations) : [];
      const q = (s.query||'').length>100 ? s.query.substring(0,100)+'…' : (s.query||'—');

      const evalsItems = allEvals.length > 0
        ? allEvals.map(([key, ev]) => buildEvalItem(code, key, ev, s)).join('')
        : `<div style="padding:.75rem 1.25rem;font-size:13px;color:var(--muted);background:var(--bg);border-top:.5px solid var(--border);">Καμία αξιολόγηση ακόμη.</div>`;

      return `
        <div class="sess-card">
          <div class="sess-head">
            <div style="flex:1;min-width:0;">
              <div class="sess-title">${esc(s.llmTitle||'—')}
                <span style="font-size:12px;font-weight:400;color:var(--muted);">· ${esc(s.personaTitle||'')}</span>
              </div>
              <div class="sess-role">${esc(s.personaRole||'—')}</div>
              <div class="sess-meta">
                <span style="font-family:monospace;font-weight:600;color:var(--blue-t);">${esc(code)}</span>
                &nbsp;·&nbsp;Creator: ${esc(s.creator||'')}
                &nbsp;·&nbsp;${esc(s.createdAt||'')}
              </div>
              <div class="sess-query">${esc(q)}</div>
            </div>
            <a href="evaluation.html?session=${esc(code)}" class="btn sm pri" style="flex-shrink:0;">+ Νέα Αξιολόγηση</a>
          </div>
          <div class="evals-section">
            <div class="evals-header">Αξιολογήσεις (${allEvals.length})</div>
            ${evalsItems}
          </div>
        </div>`;
    }).join('');

    $('main-body').innerHTML = html;
  }catch(e){
    $('main-body').innerHTML=`<div class="notice n-err">Σφάλμα φόρτωσης: ${esc(e.message)}</div>`;
  }
}

function isMine(ev){
  if(!ME) return false;
  if(ev.evaluatorUid   && ev.evaluatorUid   === ME.uid)   return true;
  if(ev.evaluatorEmail && ev.evaluatorEmail === ME.email) return true;
  return false;
}

function buildFrozenFields(s){
  const row = (label, val, full=false) => `
    <div class="frozen-field${full?' frozen-full':''}">
      <div class="frozen-label">${label}</div>
      <div class="frozen-val">${esc(val||'—')}</div>
    </div>`;

  const roleRow = `
    <div class="frozen-field frozen-full">
      <div class="frozen-label">Role of the Persona</div>
      <div class="frozen-val" style="font-size:15px;font-weight:500;color:var(--blue-t);background:var(--blue-bg);border-color:transparent;line-height:1.65;">${esc(s.personaRole||'—')}</div>
    </div>`;

  return `
    <div class="frozen-section">
      <div class="frozen-title">🔒 Στοιχεία Session (παγωμένα)</div>
      <div class="frozen-grid">
        ${row('Creator', s.creator)}
        ${row('Title of the Persona', s.personaTitle)}
        ${row('LLM', s.llmTitle)}
        ${row('Session Code', '')}
        ${roleRow}
        ${s.guidelines ? row('Instructional Guidelines', s.guidelines, true) : ''}
        ${row('LLM Description', s.llmDescription, true)}
        ${row('Query — ChatGPT Version 1', s.query, true)}
      </div>
    </div>`;
}

function buildEvalItem(sessionCode, evalKey, ev, sessionData){
  const mine     = isMine(ev);
  const stateKey = sessionCode + '___' + evalKey;

  editState[stateKey] = {
    ratings:  Object.assign({}, ev.ratings  || {}),
    comments: Object.assign({}, ev.comments || {})
  };

  const chips = CRITERIA.map(c => {
    const val = ev.ratings && ev.ratings[c.id] ? ev.ratings[c.id] : '—';
    return `<span class="sc${mine?' mine':''}">${c.id}. ${esc(val)}</span>`;
  }).join('');

  const mineBadge   = mine ? `<span class="eval-mine">Η αξιολόγησή μου</span>` : '';
  const editedBadge = ev.lastEdited ? `<span class="eval-edited">✏ ${esc(ev.lastEdited)}</span>` : '';
  const editBtn     = mine
    ? `<button class="btn sm" onclick="toggleEditForm('${esc(stateKey)}')">✏ Επεξεργασία</button>`
    : `<span style="font-size:11px;color:var(--muted);">—</span>`;

  // Criteria edit fields
  const critHtml = CRITERIA.map(c => {
    const selVal     = editState[stateKey].ratings[c.id]  || null;
    const commentVal = editState[stateKey].comments[c.id] || '';
    return `
      <div class="ecc">
        <div class="ech"><div class="ecn">${c.id}</div><div class="ecname">${esc(c.name)}</div></div>
        <div class="emcg" id="mcg-${esc(stateKey)}-${c.id}">
          ${c.opts.map(o=>`
            <button class="emco${selVal===o?' sel':''}"
              onclick="pickOption('${esc(stateKey)}',${c.id},'${esc(o)}',this)">
              ${esc(o)}
            </button>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--red);display:none;" id="merr-${esc(stateKey)}-${c.id}">Επιλέξτε</div>
        <textarea class="fi" rows="2" placeholder="Σχόλια..." style="font-size:12px;margin-top:4px;"
          onchange="pickComment('${esc(stateKey)}',${c.id},this.value)">${esc(commentVal)}</textarea>
      </div>`;
  }).join('');

  const editFormHtml = mine ? `
    <div class="edit-form" id="ef-${esc(stateKey)}">
      ${buildFrozenFields(sessionData)}
      <div class="criteria-section">
        <div class="criteria-title">✏ Επεξεργασία Κριτηρίων
          <span style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;">
            — αξιολόγηση ${esc(ev.timestamp||'')}
          </span>
        </div>
        ${critHtml}
        <div id="ef-msg-${esc(stateKey)}"></div>
        <div class="btn-row">
          <button class="btn pri" style="background:var(--green);border-color:var(--green);"
            onclick="saveEdit('${esc(sessionCode)}','${esc(evalKey)}','${esc(stateKey)}')">
            Αποθήκευση αλλαγών ✓
          </button>
          <button class="btn" onclick="toggleEditForm('${esc(stateKey)}')">Ακύρωση</button>
          <span id="ef-load-${esc(stateKey)}" style="display:none;font-size:13px;color:var(--muted);">
            <span class="spin"></span> Αποθήκευση...
          </span>
        </div>
      </div>
    </div>` : '';

  return `
    <div class="eval-row" id="er-${esc(stateKey)}">
      <div class="eval-left">
        <div class="eval-who">${esc(ev.evaluator||'—')}${mineBadge}${editedBadge}</div>
        <div class="eval-when">${esc(ev.timestamp||'')}</div>
        <div class="scores-row">${chips}</div>
      </div>
      <div>${editBtn}</div>
    </div>
    ${editFormHtml}`;
}

// ── Global handlers ───────────────────────────────────────────────────────────

window.toggleEditForm = function(stateKey){
  const el = $('ef-'+stateKey);
  if(!el) return;
  const opening = !el.classList.contains('open');
  el.classList.toggle('open');
  if(opening) el.scrollIntoView({behavior:'smooth', block:'start'});
};

window.pickOption = function(stateKey, cid, val, btn){
  if(!editState[stateKey]) return;
  editState[stateKey].ratings[cid] = val;
  const group = $('mcg-'+stateKey+'-'+cid);
  if(group) group.querySelectorAll('.emco').forEach(b=>{
    b.classList.toggle('sel', b.textContent.trim()===val);
    b.classList.remove('er');
  });
  const errEl = $('merr-'+stateKey+'-'+cid);
  if(errEl) errEl.style.display='none';
};

window.pickComment = function(stateKey, cid, val){
  if(!editState[stateKey]) return;
  editState[stateKey].comments[cid] = val;
};

window.saveEdit = async function(sessionCode, evalKey, stateKey){
  const state = editState[stateKey];
  if(!state) return;

  let valid = true;
  CRITERIA.forEach(c=>{
    if(!state.ratings[c.id]){
      const errEl=$('merr-'+stateKey+'-'+c.id);
      if(errEl) errEl.style.display='block';
      const group=$('mcg-'+stateKey+'-'+c.id);
      if(group) group.querySelectorAll('.emco').forEach(b=>b.classList.add('er'));
      valid=false;
    }
  });
  if(!valid){
    const msgEl=$('ef-msg-'+stateKey);
    if(msgEl) msgEl.innerHTML=`<div class="notice n-err" style="margin:.5rem 0;">Συμπλήρωσε όλα τα κριτήρια.</div>`;
    return;
  }

  const loadEl=$('ef-load-'+stateKey);
  if(loadEl) loadEl.style.display='';

  try{
    const origSnap = await db.ref('sessions/'+sessionCode+'/evaluations/'+evalKey+'/timestamp').get();
    const origTs   = origSnap.exists() ? origSnap.val() : now();

    await db.ref('sessions/'+sessionCode+'/evaluations/'+evalKey).set({
      evaluator:      ME.displayName || ME.email,
      evaluatorEmail: ME.email,
      evaluatorUid:   ME.uid,
      timestamp:      origTs,
      lastEdited:     now(),
      ratings:        Object.assign({}, state.ratings),
      comments:       Object.assign({}, state.comments)
    });

    if(loadEl) loadEl.style.display='none';
    await load();

  }catch(e){
    if(loadEl) loadEl.style.display='none';
    const msgEl=$('ef-msg-'+stateKey);
    if(msgEl) msgEl.innerHTML=`<div class="notice n-err" style="margin:.5rem 0;">Σφάλμα: ${esc(e.message)}</div>`;
  }
};
</script>
</body>
</html>
