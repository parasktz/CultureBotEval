<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Criteria Stats — CultureBotEval</title>
<style>
:root{
  --bg:#f4f3ee; --card:#fff; --border:rgba(0,0,0,.09);
  --text:#18180f; --muted:#68685f; --muted-2:#a8a89e;
  --blue-t:#0a3d6e;
  /* Quality scale: best → worst */
  --q0:#4a9d6b;  /* dark green  — best */
  --q1:#94b85b;  /* lime        — good */
  --q2:#d4a82b;  /* amber       — mid */
  --q3:#c85a4a;  /* red         — worst */
  --q-zero:#e5e4de;
  --llm-chatgpt:#10a37f; --llm-gemini:#4285f4;
  --llm-search:#b14dd1; --llm-other:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg); color:var(--text); padding:1.5rem 1.5rem 3rem;
  max-width:1100px; margin:0 auto;
}

.meta-stamp{font-size:10.5px; color:var(--muted-2); text-align:right; margin-bottom:.5rem;}

.summary{display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:1.25rem;}
.summary-chip{
  background:var(--card); border:.5px solid var(--border); border-radius:999px;
  padding:.35rem .9rem; font-size:11.5px; color:var(--muted);
  display:inline-flex; align-items:center; gap:6px;
}
.summary-chip strong{color:var(--text); font-weight:600;}

.persona-nav{
  display:flex; gap:.4rem; margin-bottom:1.5rem; padding-bottom:.5rem;
  overflow-x:auto; border-bottom:.5px solid var(--border);
  scrollbar-width:none;
}
.persona-nav::-webkit-scrollbar{display:none;}
.persona-pill{
  background:transparent; border:.5px solid var(--border); color:var(--muted);
  padding:.5rem .95rem; border-radius:999px;
  font-size:12.5px; font-weight:500; cursor:pointer; white-space:nowrap;
  transition:all .15s ease; font-family:inherit;
}
.persona-pill:hover{color:var(--text); border-color:var(--muted-2);}
.persona-pill.active{background:var(--blue-t); color:#fff; border-color:var(--blue-t);}
.persona-pill .count{
  display:inline-block; margin-left:6px; padding:1px 7px;
  background:rgba(0,0,0,.06); border-radius:999px; font-size:10.5px;
}
.persona-pill.active .count{background:rgba(255,255,255,.2);}

.persona-header{margin-bottom:1.5rem;}
.persona-label{font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:.4rem;}
.persona-title{font-size:28px; font-weight:600; color:var(--text); line-height:1.2; margin-bottom:.6rem; letter-spacing:-.01em;}
.persona-meta{font-size:12.5px; color:var(--muted); line-height:1.5; max-width:720px;}
.persona-meta strong{color:var(--text); font-weight:500;}

.section-head{
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--muted); margin:1.75rem 0 .75rem;
  display:flex; align-items:center; gap:8px;
}
.section-head::after{content:''; flex:1; height:.5px; background:var(--border);}

.query-list{display:flex;flex-direction:column;gap:.5rem;}
.query-card{
  background:var(--card); border:.5px solid var(--border); border-radius:10px;
  overflow:hidden; transition:box-shadow .2s ease;
}
.query-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.04);}
.query-card.open{box-shadow:0 4px 20px rgba(0,0,0,.06);}

.query-head{display:flex; align-items:center; gap:.85rem; padding:.95rem 1.1rem; cursor:pointer; user-select:none; transition:background .12s ease;}
.query-head:hover{background:rgba(0,0,0,.015);}
.query-chevron{flex-shrink:0; width:16px; height:16px; color:var(--muted-2); transition:transform .25s ease;}
.query-card.open .query-chevron{transform:rotate(90deg);}
.query-title{flex:1; font-size:13.5px; color:var(--text); font-weight:500; line-height:1.45; word-break:break-word;}
.query-badges{display:flex; gap:.35rem; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; max-width:40%;}
.llm-badge{font-size:10.5px; padding:2px 8px; border-radius:999px; color:#fff; font-weight:500; white-space:nowrap;}
.query-evals{font-size:11px; color:var(--muted); background:rgba(0,0,0,.04); padding:2px 8px; border-radius:999px; white-space:nowrap;}

.query-body{max-height:0; overflow:hidden; transition:max-height .45s ease;}
.query-card.open .query-body{max-height:8000px;}
.query-body-inner{padding:.2rem 1.1rem 1.25rem;}

/* =========== Criterion block =========== */
.criterion{padding:1rem 0; border-top:.5px solid var(--border);}
.criterion:first-child{border-top:none; padding-top:.4rem;}
.crit-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:.7rem; gap:.8rem;}
.crit-name{font-size:13px; font-weight:600; color:var(--text); letter-spacing:-.005em;}
.crit-score{font-size:11.5px; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap;}
.crit-score strong{color:var(--text); font-size:12.5px; font-weight:600;}

/* Stacked distribution bar */
.stack-bar{
  display:flex; width:100%; height:30px; border-radius:6px;
  overflow:hidden; background:var(--q-zero);
  box-shadow:inset 0 0 0 .5px rgba(0,0,0,.06);
  margin-bottom:.55rem;
}
.stack-segment{
  height:100%; display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:12px; font-weight:600;
  transition:width .4s ease, filter .15s ease;
  font-variant-numeric:tabular-nums;
  text-shadow:0 1px 1px rgba(0,0,0,.15);
  min-width:14px;
  cursor:default;
}
.stack-segment:hover{filter:brightness(1.08);}
.stack-bar-empty{
  height:30px; border-radius:6px; background:var(--q-zero);
  display:flex; align-items:center; justify-content:center;
  color:var(--muted-2); font-size:11px; margin-bottom:.55rem;
  box-shadow:inset 0 0 0 .5px rgba(0,0,0,.06);
}

/* Legend */
.legend{
  display:flex; flex-wrap:wrap; gap:.5rem .9rem;
  font-size:11px; color:var(--muted);
  margin-bottom:.65rem;
}
.legend-item{
  display:inline-flex; align-items:center; gap:5px;
  white-space:nowrap;
}
.legend-item.zero{opacity:.45;}
.legend-swatch{
  width:9px; height:9px; border-radius:3px; flex-shrink:0;
}
.legend-item strong{color:var(--text); font-weight:600; font-variant-numeric:tabular-nums;}

/* Per-LLM breakdown — each LLM shown with its actual rating pill */
.llm-block{
  margin-top:.45rem; padding-top:.55rem;
  border-top:.5px dashed var(--border);
}
.llm-block-label{
  font-size:10px; text-transform:uppercase; letter-spacing:.1em;
  color:var(--muted-2); margin-bottom:.4rem;
}
.llm-rows{display:flex; flex-direction:column; gap:.3rem;}
.llm-row{
  display:flex; align-items:center; gap:.6rem;
  font-size:11.5px;
}
.llm-row-name{
  display:flex; align-items:center; gap:6px;
  color:var(--text); font-weight:500;
  min-width:160px; flex-shrink:0;
}
.llm-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.llm-row-ratings{
  display:flex; gap:4px; flex-wrap:wrap; flex:1;
}
.rating-pill{
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 9px; border-radius:999px;
  color:#fff; font-size:11px; font-weight:500;
  font-variant-numeric:tabular-nums;
  text-shadow:0 1px 1px rgba(0,0,0,.12);
}
.rating-pill .n{
  background:rgba(255,255,255,.28); padding:0 5px;
  border-radius:999px; font-size:10px; font-weight:600;
}

.empty{padding:2.5rem 1rem; text-align:center; font-size:13px; color:var(--muted);}
.no-data{padding:1.2rem; text-align:center; font-size:12px; color:var(--muted); background:rgba(0,0,0,.02); border-radius:8px;}
</style>
</head>

<script>
(function(){
  const DATA = JSON.parse(document.getElementById('report-data').textContent);
  const CRIT_DEFS = JSON.parse(document.getElementById('criteria-defs').textContent).filter(Boolean);

  const LLM_COLORS = {
    'ChatGPT':            'var(--llm-chatgpt)',
    'Gemini':             'var(--llm-gemini)',
    'SearchCultureBot v1':'var(--llm-search)'
  };
  const llmColor = n => LLM_COLORS[n] || 'var(--llm-other)';

  /* Map (level position, total levels) → color (best→worst).
     3 levels:  green, amber, red
     4 levels:  green, lime, amber, red                          */
  function levelColor(pos, total){
    if (total <= 1) return 'var(--q0)';
    if (total === 2) return ['var(--q0)','var(--q3)'][pos];
    if (total === 3) return ['var(--q0)','var(--q2)','var(--q3)'][pos];
    if (total === 4) return ['var(--q0)','var(--q1)','var(--q2)','var(--q3)'][pos];
    // fallback: interpolate linearly — clamp to q0..q3
    const idx = Math.min(3, Math.round((pos/(total-1))*3));
    return ['var(--q0)','var(--q1)','var(--q2)','var(--q3)'][idx];
  }

  function esc(s){
    return String(s==null?'':s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  const root = document.getElementById('root');
  const personaNames = Object.keys(DATA.personas).sort();

  if (!personaNames.length){
    root.innerHTML = '<div class="empty">📭 No evaluations found.<br><span style="font-size:12px;">Sessions must contain user evaluations to be included in this report.</span></div>';
    return;
  }

  const state = { current: personaNames[0] };

  function render(){
    const P = DATA.personas[state.current];
    const s = DATA.summary;

    root.innerHTML = `
      <div class="summary">
        <span class="summary-chip"><strong>${s.personas}</strong> personas</span>
        <span class="summary-chip"><strong>${s.queries}</strong> queries</span>
        <span class="summary-chip"><strong>${s.llms}</strong> LLMs</span>
        <span class="summary-chip"><strong>${s.evals}</strong> user evaluations</span>
      </div>
      <div class="persona-nav" id="persona-nav"></div>
      <div id="persona-body"></div>
    `;

    const nav = document.getElementById('persona-nav');
    personaNames.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'persona-pill' + (name === state.current ? ' active' : '');
      btn.innerHTML = `${esc(name)}<span class="count">${DATA.personas[name].evalCount}</span>`;
      btn.onclick = () => { state.current = name; render(); };
      nav.appendChild(btn);
    });

    renderPersona(P);
  }

  function renderPersona(P){
    const body = document.getElementById('persona-body');
    const qNames = Object.keys(P.queries).sort();

    body.innerHTML = `
      <div class="persona-header">
        <div class="persona-label">Persona</div>
        <h1 class="persona-title">${esc(P.title)}</h1>
        ${P.role ? `<div class="persona-meta">${esc(P.role)}</div>` : ''}
        ${P.guidelines ? `<div class="persona-meta" style="margin-top:.5rem;"><strong>Guidelines:</strong> ${esc(P.guidelines)}</div>` : ''}
      </div>
      <div class="section-head">Queries · expand to see per-criterion stats</div>
      <div class="query-list" id="query-list"></div>
    `;

    const list = document.getElementById('query-list');
    qNames.forEach((qName, idx) => {
      list.appendChild(buildCard(P.queries[qName], idx));
    });
  }

  function buildCard(Q, idx){
    const card = document.createElement('div');
    card.className = 'query-card';
    const badges = Q.llms.map(l =>
      `<span class="llm-badge" style="background:${llmColor(l)}">${esc(l)}</span>`
    ).join('');

    card.innerHTML = `
      <div class="query-head">
        <svg class="query-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <div class="query-title">${esc(Q.text)}</div>
        <div class="query-badges">
          ${badges}
          <span class="query-evals">${Q.evalCount} eval${Q.evalCount===1?'':'s'}</span>
        </div>
      </div>
      <div class="query-body"><div class="query-body-inner"></div></div>
    `;

    const head = card.querySelector('.query-head');
    const inner = card.querySelector('.query-body-inner');
    let rendered = false;

    head.onclick = () => {
      card.classList.toggle('open');
      if (!rendered){ renderQuery(inner, Q); rendered = true; }
    };
    if (idx === 0) setTimeout(() => head.click(), 30);
    return card;
  }

  function renderQuery(container, Q){
    if (!Q.overall.length || Q.overall.every(s => s.count === 0)){
      container.innerHTML = '<div class="no-data">No evaluation data for this query.</div>';
      return;
    }

    container.innerHTML = Q.overall.map((stat, i) => {
      if (stat.count === 0) return '';
      return renderCriterion(stat, CRIT_DEFS[i], Q, i);
    }).join('');
  }

  /* --------- THE CRITERION BLOCK (distribution-first) --------- */
  function renderCriterion(stat, def, Q, idx){
    if (!def) return '';
    const levels = def.levels;          /* ordered best → worst */
    const total  = levels.length;
    const counts = levels.map(l => stat.distribution[l] || 0);
    const sum    = counts.reduce((a,b)=>a+b, 0);
    const avg    = stat.avg;
    const avgStr = avg != null ? avg.toFixed(0) + '%' : '—';

    /* Stacked bar with count inside each segment */
    let stackHtml;
    if (sum === 0){
      stackHtml = '<div class="stack-bar-empty">No ratings</div>';
    } else {
      const segs = levels.map((lvl, pos) => {
        const n = counts[pos];
        if (n === 0) return '';
        const w = (n / sum) * 100;
        const color = levelColor(pos, total);
        return `
          <div class="stack-segment"
               style="width:${w}%;background:${color}"
               title="${esc(lvl)}: ${n} of ${sum} (${w.toFixed(0)}%)">
            ${n}
          </div>`;
      }).join('');
      stackHtml = `<div class="stack-bar">${segs}</div>`;
    }

    /* Legend — all levels listed, zero-counts dimmed */
    const legendHtml = levels.map((lvl, pos) => {
      const n = counts[pos];
      const color = levelColor(pos, total);
      return `
        <span class="legend-item${n===0?' zero':''}">
          <span class="legend-swatch" style="background:${color}"></span>
          ${esc(lvl)}: <strong>${n}</strong>
        </span>`;
    }).join('');

    /* Per-LLM — for each LLM show rating pill(s) with actual answer */
    let llmBlockHtml = '';
    if (Q.llms.length > 0){
      const rows = Q.llms.map(l => {
        const lStat = Q.perLlm[l] && Q.perLlm[l][idx];
        if (!lStat || lStat.count === 0){
          return `
            <div class="llm-row">
              <div class="llm-row-name">
                <span class="llm-dot" style="background:${llmColor(l)}"></span>
                ${esc(l)}
              </div>
              <div class="llm-row-ratings" style="color:var(--muted-2);font-size:11px;">
                — no rating —
              </div>
            </div>`;
        }
        /* Build pills — one per rating level that got at least 1 vote */
        const pills = levels.map((lvl, pos) => {
          const n = lStat.distribution[lvl] || 0;
          if (n === 0) return '';
          const color = levelColor(pos, total);
          const badge = lStat.count > 1 && n >= 1
            ? `<span class="n">×${n}</span>`
            : (lStat.count > 1 ? '' : '');
          return `<span class="rating-pill" style="background:${color}">
            ${esc(lvl)}${badge}
          </span>`;
        }).join('');
        return `
          <div class="llm-row">
            <div class="llm-row-name">
              <span class="llm-dot" style="background:${llmColor(l)}"></span>
              ${esc(l)}
            </div>
            <div class="llm-row-ratings">${pills}</div>
          </div>`;
      }).join('');
      llmBlockHtml = `
        <div class="llm-block">
          <div class="llm-block-label">By LLM</div>
          <div class="llm-rows">${rows}</div>
        </div>`;
    }

    return `
      <div class="criterion">
        <div class="crit-head">
          <span class="crit-name">${esc(stat.name)}</span>
          <span class="crit-score">${stat.count} rating${stat.count===1?'':'s'} · avg <strong>${avgStr}</strong></span>
        </div>
        ${stackHtml}
        <div class="legend">${legendHtml}</div>
        ${llmBlockHtml}
      </div>
    `;
  }

  render();
})();
</script>
</body>
</html>
