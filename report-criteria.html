<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CultureBotEval — Persona & Query Stats</title>
<script src="config.js"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<style>
:root{
  --bg:#f4f3ee; --card:#fff; --border:rgba(0,0,0,.09);
  --text:#18180f; --muted:#68685f;
  --blue:#2b7fd4; --blue-bg:#e8f2fc; --blue-t:#0a3d6e; --r:10px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column;}

.topbar{background:var(--card); border-bottom:.5px solid var(--border);
        padding:.8rem 2rem; display:flex; align-items:center; justify-content:space-between;
        position:sticky; top:0; z-index:10;}
.topbar-title{font-size:15px; font-weight:500; color:var(--blue-t);}
.user-pill{font-size:11px; background:var(--blue-bg); color:var(--blue-t); padding:3px 10px; border-radius:20px;}

.container { max-width: 900px; margin: 2rem auto; width: 95%; flex:1; }

/* Persona Styling */
.persona-group { margin-bottom: 2.5rem; }
.persona-header { 
    background: var(--blue-t); color: white; padding: 12px 20px; 
    border-radius: 8px; margin-bottom: 1rem; font-size: 1.1rem; 
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Accordion Styling */
.query-card { 
    background: var(--card); border: 1px solid var(--border); 
    border-radius: 8px; margin-bottom: 8px; overflow: hidden; 
}
.accordion-btn {
    width: 100%; padding: 14px 20px; background: none; border: none;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; text-align: left; font-size: 0.95rem; font-weight: 500;
}
.accordion-btn:hover { background: #fafafa; }
.accordion-content { display: none; padding: 0 20px 20px 20px; border-top: 1px solid var(--border); background: #fdfdfd; }
.accordion-content.active { display: block; }

/* Stats Table */
.stats-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
.stats-table th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; padding: 8px; border-bottom: 2px solid var(--bg); }
.stats-table td { padding: 10px 8px; border-bottom: 1px solid var(--bg); }
.avg-badge { background: var(--blue-bg); color: var(--blue-t); padding: 2px 8px; border-radius: 4px; font-weight: bold; }

.screen{display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:14px; padding:2rem;}
.spinner{width:28px; height:28px; border:2.5px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Utility */
.hidden { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">CultureBotEval — Analysis by Persona</span>
  </div>
  <div class="topbar-right">
    <span class="user-pill" id="user-label"></span>
  </div>
</div>

<div id="loader" class="screen"><div class="spinner"></div></div>

<div class="container hidden" id="main-content">
  <!-- Τα δεδομένα θα μπούν εδώ δυναμικά -->
</div>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const auth = firebase.auth();

auth.onAuthStateChanged(async user => {
  if(!user) { window.location.href = "index.html"; return; } // Ανακατεύθυνση αν δεν είναι logged in
  document.getElementById('user-label').textContent = user.email;
  fetchAndProcessData();
});

async function fetchAndProcessData() {
  try {
    const snap = await db.ref('sessions').once('value');
    const data = snap.val();
    if(!data) return;

    const grouped = {};

    // 1. Grouping: Persona > Query > LLM
    Object.values(data).forEach(s => {
      if(!s.persona || !s.query || !s.ratings) return;

      const persona = s.persona;
      const query = s.query;
      const llm = s.llmTitle || "Standard LLM";

      if(!grouped[persona]) grouped[persona] = {};
      if(!grouped[persona][query]) grouped[persona][query] = {};
      if(!grouped[persona][query][llm]) grouped[persona][query][llm] = [];

      // Προσθήκη μόνο έγκυρων αριθμητικών ratings
      const validRatings = s.ratings.filter(r => typeof r === 'number' || !isNaN(parseFloat(r)));
      grouped[persona][query][llm].push(...validRatings.map(Number));
    });

    renderUI(grouped);
  } catch (e) {
    console.error(e);
  }
}

function renderUI(grouped) {
  const container = document.getElementById('main-content');
  let html = '';

  for (const [persona, queries] of Object.entries(grouped)) {
    html += `
      <div class="persona-group">
        <div class="persona-header">👤 Persona: ${persona}</div>
    `;

    for (const [query, llms] of Object.entries(queries)) {
      html += `
        <div class="query-card">
          <button class="accordion-btn" onclick="toggleAccordion(this)">
            <span><strong>Query:</strong> ${query}</span>
            <span>▼</span>
          </button>
          <div class="accordion-content">
            <table class="stats-table">
              <thead>
                <tr><th>LLM Model</th><th>Avg. User Rating</th><th>Samples</th></tr>
              </thead>
              <tbody>`;

      for (const [llm, ratings] of Object.entries(llms)) {
        const avg = (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(2);
        html += `
          <tr>
            <td>${llm}</td>
            <td><span class="avg-badge">${avg} / 10</span></td>
            <td style="color:var(--muted)">${ratings.length} votes</td>
          </tr>`;
      }

      html += `</tbody></table></div></div>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;
  document.getElementById('loader').classList.add('hidden');
  container.classList.remove('hidden');
}

function toggleAccordion(btn) {
  const content = btn.nextElementSibling;
  const isVisible = content.classList.contains('active');
  
  // Κλείσιμο όλων των άλλων αν θες (προαιρετικό)
  // document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('active'));
  
  if(!isVisible) content.classList.add('active');
  else content.classList.remove('active');
}
</script>

</body>
</html>
