<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CultureBotEval — Detailed Stats</title>
<script src="config.js"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<style>
:root{
  --bg:#f8f9fa; --card:#fff; --border:#e0e0e0;
  --text:#212529; --muted:#6c757d;
  --blue:#0d6efd; --blue-t:#052c65;
}
body{font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); padding:20px;}
.container { max-width: 1000px; margin: 0 auto; }

.persona-section { margin-bottom: 40px; }
.persona-title { 
    background: var(--blue-t); color: white; padding: 15px; 
    border-radius: 8px; margin-bottom: 15px; font-size: 1.2rem;
}

.query-accordion { 
    background: var(--card); border: 1px solid var(--border); 
    border-radius: 8px; margin-bottom: 10px; 
}
.accordion-header {
    width: 100%; padding: 15px; border: none; background: none;
    display: flex; justify-content: space-between; cursor: pointer;
    font-weight: 600; text-align: left; font-size: 0.95rem;
}
.accordion-content { display: none; padding: 0 15px 15px; border-top: 1px solid var(--border); overflow-x: auto; }
.active { display: block; }

table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
th { background: #f1f3f5; padding: 10px; border: 1px solid var(--border); text-align: center; }
td { padding: 10px; border: 1px solid var(--border); text-align: center; }
.llm-name { font-weight: bold; text-align: left; background: #f8f9fa; }
.avg-val { color: var(--blue); font-weight: bold; }

.loader { text-align: center; padding: 50px; font-weight: bold; }
</style>
</head>
<body>

<div class="container" id="app">
    <div class="loader">Φόρτωση δεδομένων και υπολογισμός στατιστικών...</div>
</div>

<script>
// Ορισμός κριτηρίων βάσει της σειράς στο ratings array (null, 1, 2... 10)
const CRITERIA = [
    "Overall", "Hallucination", "Relevance", "Coherence", 
    "Groundedness", "Clarity", "Utility", "Bias", 
    "Tone", "Safety", "Completeness"
];

firebase.initializeApp(FIREBASE_CONFIG);

firebase.auth().onAuthStateChanged(async user => {
    if(!user) { document.body.innerHTML = "Access Denied"; return; }
    
    const snap = await firebase.database().ref('sessions').once('value');
    const sessions = snap.val();
    if(!sessions) return;

    const grouped = {};

    Object.values(sessions).forEach(s => {
        if(!s.persona || !s.query || !s.ratings) return;
        
        const p = s.persona;
        const q = s.query;
        const llm = s.llmTitle || "Unknown";

        if(!grouped[p]) grouped[p] = {};
        if(!grouped[p][q]) grouped[p][q] = {};
        if(!grouped[p][q][llm]) {
            // Προετοιμασία αθροίσματος για κάθε κριτήριο
            grouped[p][q][llm] = { counts: new Array(11).fill(0), sums: new Array(11).fill(0) };
        }

        // Επεξεργασία των ratings (Index 1 έως 10)
        s.ratings.forEach((val, idx) => {
            if(idx === 0) return; // Το index 0 είναι συνήθως null
            let num = parseFloat(val);
            if(!isNaN(num)) {
                grouped[p][q][llm].sums[idx] += num;
                grouped[p][q][llm].counts[idx] += 1;
            }
        });
    });

    render(grouped);
});

function render(data) {
    let html = '';
    for(const [persona, queries] of Object.entries(data)) {
        html += `<div class="persona-section">
                    <div class="persona-title">👤 Persona: ${persona}</div>`;
        
        for(const [query, llms] of Object.entries(queries)) {
            html += `
                <div class="query-accordion">
                    <button class="accordion-header" onclick="toggle(this)">
                        <span>❓ Query: ${query}</span>
                        <span>▼</span>
                    </button>
                    <div class="accordion-content">
                        <table>
                            <thead>
                                <tr>
                                    <th>LLM Model</th>
                                    ${CRITERIA.slice(1).map(c => `<th>${c}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>`;
            
            for(const [llm, stats] of Object.entries(llms)) {
                html += `<tr><td class="llm-name">${llm}</td>`;
                for(let i=1; i<=10; i++) {
                    const avg = stats.counts[i] > 0 ? (stats.sums[i] / stats.counts[i]).toFixed(1) : "-";
                    html += `<td class="avg-val">${avg}</td>`;
                }
                html += `</tr>`;
            }
            
            html += `</tbody></table></div></div>`;
        }
        html += `</div>`;
    }
    document.getElementById('app').innerHTML = html;
}

function toggle(btn) {
    const content = btn.nextElementSibling;
    content.classList.toggle('active');
}
</script>
</body>
</html>
